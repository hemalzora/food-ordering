server:
  port: 8081

spring:
  application:
    name: restaurant-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/restaurant_db}
    username: ${DB_USER:restaurant}
    password: ${DB_PASSWORD:restaurant}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs
